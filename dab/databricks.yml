bundle:
  name: my_pipeline

workspace:
  host: https://dbc-283c562e-fc2f.cloud.databricks.com

# variables:
#   databricks_host:
#     description: Databricks Workspace URL

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    workspace:
      host: https://dbc-283c562e-fc2f.cloud.databricks.com/

resources:
  jobs:
    ingest_data:
      name: Ingest Data
      tasks:
      - task_key: raw_to_bronze
        notebook_task: 
          notebook_path: ./notebooks/raw_to_bronze.ipynb
        # base_parameters:
        #   file_path: /Volumes/warehouse/default/raw/inventory-2026.csv
      - task_key: bronze_qc
        depends_on:
          - task_key: raw_to_bronze
        notebook_task:
          notebook_path: ./notebooks/qc_bronze.ipynb